<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>WiFi Access</title>

<style>
  body {
    font-family: system-ui;
    margin: 24px;
    max-width: 620px;
    background: #222222;
    color: #ffffff;
  }

  h2 {
    margin-bottom: 12px;
  }

  .card {
    border: 1px solid #444;
    border-radius: 16px;
    padding: 16px;
    background: #2a2a2a;
  }

  .row {
    margin-top: 16px;
  }

  .inline {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }

  .label {
    font-size: 14px;
    opacity: 0.7;
  }

  .value {
    font-size: 22px;
    font-weight: 500;
    word-break: break-all;
  }

  button {
    padding: 14px 16px;
    font-size: 18px;
    border-radius: 14px;
    border: 1px solid #555;
    background: #333;
    color: #fff;
  }

  button:active {
    transform: scale(0.98);
  }

  .muted {
    opacity: 0.6;
    font-size: 13px;
    margin-top: 10px;
  }
</style>
</head>

<body>

<h2>WiFi Access</h2>

<div class="card">

  <div class="row">
    <div class="label">SSID</div>
    <div id="ssid" class="value"></div>
  </div>

  <div class="row">
    <div class="label">Password</div>
    <div id="pass" class="value"></div>
  </div>

  <div class="row inline">
    <button onclick="copyPass()">Copy Password</button>
  </div>


</div>

<script>
  const params = new URLSearchParams(window.location.search);

  const ssid = params.get("ssid");
  const pass = params.get("pass");

  document.getElementById("ssid").textContent = ssid || "N/A";
  document.getElementById("pass").textContent = pass || "N/A";

  function copyPass() {
    if (pass) {
      navigator.clipboard.writeText(pass);
      alert("Password copied");
    }
  }
</script>

</body>
</html>
